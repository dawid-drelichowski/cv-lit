name: Deploy to GitHub Pages

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Setup
        uses: ./.github/actions/setup
      - name: Run linter
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup
        uses: ./.github/actions/setup
      - name: Build app
        run: npm run build
      - name: Start server
        run: npm run preview & npx wait-on http://localhost:4173
      - name: Run tests
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
        run: npx percy exec -- npm test

  deploy:
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: github.ref_name == 'main' || github.ref_name == 'frontend' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Setup
        uses: ./.github/actions/setup
      - name: Set base path and deploy destination
        id: config
        run: |
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            echo "base=/cv-lit/" >> $GITHUB_OUTPUT
            echo "dest=." >> $GITHUB_OUTPUT
          else
            echo "base=/cv-lit/${BRANCH}/" >> $GITHUB_OUTPUT
            echo "dest=${BRANCH}" >> $GITHUB_OUTPUT
          fi
      - name: Build for deployment
        run: npm run build -- --base ${{ steps.config.outputs.base }}
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ steps.config.outputs.dest }}
          keep_files: true
