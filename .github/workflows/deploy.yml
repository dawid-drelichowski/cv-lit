name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - frontend
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Install dependencies
        run: npm ci
      - name: Set base path and deploy destination
        id: config
        run: |
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            echo "base=/cv-lit/" >> $GITHUB_OUTPUT
            echo "dest=." >> $GITHUB_OUTPUT
          else
            echo "base=/cv-lit/${BRANCH}/" >> $GITHUB_OUTPUT
            echo "dest=${BRANCH}" >> $GITHUB_OUTPUT
          fi
      - name: Build
        run: npm run build -- --base ${{ steps.config.outputs.base }}
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ steps.config.outputs.dest }}
          keep_files: true
