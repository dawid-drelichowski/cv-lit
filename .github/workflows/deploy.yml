name: Deploy to GitHub Pages

on:
  workflow_run:
    workflows: [Lint, Test]
    types: [completed]
    branches:
      - main
      - frontend
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check that both Lint and Test passed
        if: github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const otherWorkflow = context.payload.workflow_run.name === 'Lint' ? 'Test' : 'Lint';
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: context.payload.workflow_run.head_sha,
              status: 'success',
              per_page: 50
            });
            const passed = runs.data.workflow_runs.some(run => run.name === otherWorkflow);
            if (!passed) core.setFailed(`${otherWorkflow} has not passed for this commit`);
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Install dependencies
        run: npm ci
      - name: Set base path and deploy destination
        id: config
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            echo "base=/cv-lit/" >> $GITHUB_OUTPUT
            echo "dest=." >> $GITHUB_OUTPUT
          else
            echo "base=/cv-lit/${BRANCH}/" >> $GITHUB_OUTPUT
            echo "dest=${BRANCH}" >> $GITHUB_OUTPUT
          fi
      - name: Build
        run: npm run build -- --base ${{ steps.config.outputs.base }}
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ steps.config.outputs.dest }}
          keep_files: true
